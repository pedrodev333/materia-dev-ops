name: Continuous Integration

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        
      - name: Python Lint Code Scanning Action
        uses: advanced-security/python-lint-code-scanning-action@v1.1.3
        with:
          linter: pylint

  docker:
    runs-on: ubuntu-latest
    steps:
      - # Add support for more platforms with QEMU (optional)
        # https://github.com/docker/setup-qemu-action
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

  discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy on Discord
        uses: snorrwe/discord-action@v1.0.10
        with:
          discord_message: new
          discord_token: ${{ secrets.DISCORD_WEBHOOK }}
          post_file: CHANGELOG.md
          discord_channel: '1496333307628097586' # Note: The quote marks here are required
